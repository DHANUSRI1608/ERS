server.port=${PORT:8080}

# ── Datasource (MySQL primary, H2 fallback for local dev) ─────────────────
spring.datasource.url=${DB_URL:jdbc:h2:mem:ersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# For MySQL, set env vars:
# DB_URL=jdbc:mysql://localhost:3306/ersdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# DB_DRIVER=com.mysql.cj.jdbc.Driver
# DB_USERNAME=root
# DB_PASSWORD=yourpassword
# JPA_DIALECT=org.hibernate.dialect.MySQLDialect

spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:mydefaultsecret123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Upload ────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── CORS ──────────────────────────────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL:*}

# ── Misc ──────────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true
logging.level.com.ers=INFO
logging.level.org.springframework.security=WARN